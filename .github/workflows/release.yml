name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.1.0)'
        required: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.12.0'

jobs:
  desktop:
    name: Desktop (${{ matrix.os }} / ${{ matrix.rust-target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rust-target: aarch64-apple-darwin
            artifact: macos-arm64
          - os: macos-13
            rust-target: x86_64-apple-darwin
            artifact: macos-x64
          - os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            artifact: windows-x64
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
      - run: pnpm install --frozen-lockfile

      - name: Build (macOS, signed + notarized)
        if: runner.os == 'macOS'
        run: pnpm --filter @hwpx/desktop tauri build --target ${{ matrix.rust-target }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build (Windows, signed)
        if: runner.os == 'Windows'
        run: pnpm --filter @hwpx/desktop tauri build --target ${{ matrix.rust-target }}
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: hwpx-desktop-${{ matrix.artifact }}
          path: |
            apps/desktop/src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.dmg
            apps/desktop/src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.app.tar.gz
            apps/desktop/src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.msi
            apps/desktop/src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.exe
            apps/desktop/src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.sig
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [desktop]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.version }}
          generate_release_notes: true
          draft: true
          files: artifacts/**/*
